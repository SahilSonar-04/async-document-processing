databases:
  - name: docflow-db
    databaseName: docflow_db
    user: docflow
    plan: free

services:
  - type: redis
    name: docflow-redis
    plan: free
    ipAllowList: [] # internal only
    maxmemoryPolicy: noeviction

  - type: web
    name: docflow-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: 'cd backend && bash start.sh'

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DATABASE_URL
        fromDatabase:
          name: docflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: docflow-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: docflow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: docflow-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]' # 🚨 IMPORTANT: Update this to your deployed Vercel URL later!
